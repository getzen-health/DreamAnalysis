name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

  ml:
    name: ML Lint + Test + Coverage
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pytest httpx pytest-cov

      - name: Lint Python code
        run: ruff check .

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

      - name: ML inference benchmark
        run: |
          python -c "
          import time, numpy as np
          from main import app
          from api.routes import router
          from fastapi.testclient import TestClient

          # Routes are loaded via startup event — force-register for inline test
          if not any(getattr(r, 'path', '').startswith('/api/') for r in app.routes):
              app.include_router(router, prefix='/api')

          client = TestClient(app)

          times = []
          for i in range(3):
              start = time.time()
              r = client.post('/api/simulate-eeg', json={
                  'state': 'rest', 'duration': 2.0, 'fs': 256, 'n_channels': 1
              })
              elapsed_ms = (time.time() - start) * 1000
              times.append(elapsed_ms)
              assert r.status_code == 200, f'simulate-eeg returned {r.status_code}: {r.text}'

          avg_ms = sum(times) / len(times)
          print(f'ML inference avg: {avg_ms:.0f}ms (3 runs)')
          assert avg_ms < 5000, f'Inference too slow: {avg_ms:.0f}ms > 5000ms limit'
          print('ML benchmark: PASSED')
          "

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit pip dependencies
        run: |
          pip install pip-audit
          cd ml && pip-audit -r requirements.txt || true
        continue-on-error: true
