services:
  - type: web
    name: neural-dream-ml
    env: docker
    dockerfilePath: ml/Dockerfile
    dockerContext: .   # build context = repo root (same as .dockerignore)
    plan: free         # 512 MB RAM, shared CPU, sleeps after 15 min idle
    region: oregon     # us-west (closest to Vercel's default region)

    # Render will route external traffic to this internal port
    # Must match what uvicorn listens on (${PORT:-8000} → Render sets PORT=10000)
    healthCheckPath: /health

    envVars:
      - key: CORS_ORIGINS
        value: "http://localhost:5000,http://localhost:3000,http://localhost:5173,https://dream-analysis.vercel.app,https://dream-analysis-*.vercel.app"
      - key: ML_LOG_LEVEL
        value: INFO
      # Prevents Python from writing .pyc files (saves disk on free tier)
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      # Datadog APM — set DD_API_KEY in Render dashboard to activate
      - key: DD_SITE
        value: datadoghq.com
      - key: DD_SERVICE
        value: neural-dream-ml
      - key: DD_ENV
        value: production
      - key: DD_API_KEY
        sync: false
