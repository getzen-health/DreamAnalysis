<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <!-- Datadog RUM is initialized via main.tsx using VITE_DD_* env vars -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2dd4a0" />
    <meta name="description" content="AntarAI - Track emotions, stress, readiness, and recovery from voice, watch, and optional EEG signals" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AntarAI" />
    <!-- OpenGraph -->
    <meta property="og:title" content="AntarAI — Your Brain's Daily Report" />
    <meta property="og:description" content="Track emotions, stress, readiness, and recovery from voice, health data, and optional EEG" />
    <meta property="og:image" content="/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:type" content="website" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="AntarAI — Your Brain's Daily Report" />
    <meta name="twitter:description" content="Track emotions, stress, readiness, and recovery from voice, health data, and optional EEG" />
    <meta name="twitter:image" content="/icon-512.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <title>AntarAI</title>
    <style>
      /* Prevent white flash on mobile — dark theme is default */
      html, body { background-color: hsl(222, 25%, 6%); color: hsl(38, 20%, 92%); }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@200..800&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Skip service worker on Capacitor native — it intercepts fetch and breaks API calls
      if ('serviceWorker' in navigator && !window.Capacitor) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      } else if (window.Capacitor && navigator.serviceWorker) {
        // Unregister any previously registered SW on native
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          for (var r of regs) r.unregister();
        });
      }
    </script>
  </body>
</html>
