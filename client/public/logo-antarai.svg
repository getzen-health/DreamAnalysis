<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="ringG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#e879a8"/>
    </linearGradient>
    <linearGradient id="waveG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#e879a8"/>
    </linearGradient>
    <linearGradient id="innerG" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e879a8" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="dotG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#e879a8"/>
    </linearGradient>
  </defs>

  <!-- Outer ring — violet to rose gradient -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#ringG)" stroke-width="18" opacity="0.9"/>

  <!-- Subtle inner fill -->
  <circle cx="256" cy="256" r="210" fill="url(#innerG)"/>

  <!-- Inner thin ring accent -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ringG)" stroke-width="2" opacity="0.25"/>

  <!-- EEG brain wave — flowing through center, golden to rose -->
  <path d="M80,256 C105,256 115,256 135,256 L155,256 C165,256 170,210 185,190 C200,170 210,256 225,280 C240,304 248,180 260,160 C272,140 280,310 295,330 C310,350 315,220 330,200 C340,185 348,256 358,256 L380,256 C400,256 410,256 432,256"
        fill="none" stroke="url(#waveG)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Three neural nodes along the wave -->
  <circle cx="185" cy="190" r="6" fill="url(#dotG)"/>
  <circle cx="260" cy="160" r="8" fill="url(#dotG)"/>
  <circle cx="330" cy="200" r="6" fill="url(#dotG)"/>

  <!-- Subtle connection lines from nodes — neural network feel -->
  <line x1="185" y1="190" x2="260" y2="160" stroke="#fbbf24" stroke-width="1.5" opacity="0.2"/>
  <line x1="260" y1="160" x2="330" y2="200" stroke="#fbbf24" stroke-width="1.5" opacity="0.2"/>
</svg>
