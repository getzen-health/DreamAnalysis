<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="heartG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="pulseG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4a0"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Heart shape — centered, no background -->
  <path d="M256,380 C256,380 120,300 120,200 C120,150 158,115 200,115 C232,115 250,138 256,155 C262,138 280,115 312,115 C354,115 392,150 392,200 C392,300 256,380 256,380 Z"
        fill="url(#heartG)" opacity="0.9"/>

  <!-- Heartbeat pulse line across the heart -->
  <path d="M150,230 L210,230 L225,185 L250,280 L275,195 L300,230 L362,230"
        fill="none" stroke="url(#pulseG)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
