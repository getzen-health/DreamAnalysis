version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: neuraldream
      POSTGRES_USER: neuraldream
      POSTGRES_PASSWORD: neuraldream_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuraldream"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://neuraldream:neuraldream_dev@db:5432/neuraldream
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-change-me}
      PORT: "5000"
      NODE_ENV: production
      VITE_ML_API_URL: http://ml:8000
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: neural-dream-workshop-api
      DD_ENV: ${DD_ENV:-production}
      DD_VERSION: ${DD_VERSION:-1.0.0}

  ml:
    build: ./ml
    ports:
      - "8000:8000"
    environment:
      ML_PORT: "8000"
      ML_LOG_LEVEL: INFO
      CORS_ORIGINS: http://localhost:5000,http://api:5000
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: neural-dream-workshop-ml
      DD_ENV: ${DD_ENV:-production}
      DD_VERSION: ${DD_VERSION:-1.0.0}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    profiles:
      - datadog
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      DD_CONTAINER_EXCLUDE: "name:datadog-agent"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    ports:
      - "8126:8126"

volumes:
  pgdata:
