version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: neuraldream
      POSTGRES_USER: neuraldream
      POSTGRES_PASSWORD: neuraldream_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuraldream"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://neuraldream:neuraldream_dev@db:5432/neuraldream
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SESSION_SECRET: ${SESSION_SECRET:-dev-secret-change-me}
      PORT: "5000"
      NODE_ENV: production
      VITE_ML_API_URL: http://ml:8000

  ml:
    build: ./ml
    ports:
      - "8000:8000"
    environment:
      ML_PORT: "8000"
      ML_LOG_LEVEL: INFO
      CORS_ORIGINS: http://localhost:5000,http://api:5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
